services:
  postgres:
    build:
      context: ./docker
      dockerfile: Dockerfile.postgres
    container_name: canopy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-canopy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-canopy}
      POSTGRES_DB: ${POSTGRES_DB:-canopy}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
